<!DOCTYPE html>
<html>
<head>
    <title>Transaction Manager</title>

    <style>
    table {
        width: 80%;
        border-collapse: collapse;
        margin-top: 20px;
    }

    th {
        background-color: #dad86b;
        color: white;
        padding: 12px;
    }

    td {
        padding: 10px;
        text-align: center;
        border-bottom: 1px solid #ddd;
    }

    tr:nth-child(even) {
        background-color: #f2f2f2;
    }

    tr:hover {
        background-color: #ddd;
    }

    .edit-btn {
        background-color: #408333;
        color: white;
        padding: 5px 10px;
        text-decoration: none;
        border-radius: 5px;
    }

    .delete-btn {
        background-color: #b5eb1f;
        color: white;
        padding: 5px 10px;
        text-decoration: none;
        border-radius: 5px;
    }
    </style>

</head>
<body>

    <h2>Add Transaction</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save</button>
    </form>

    <h2>Transactions</h2>

    <table>
        <tr>
            <th>S.No</th>
            <th>Description</th>
            <th>Amount</th>
            <th>Date</th>
            <th>Actions</th>
        </tr>

        {% for transaction in transactions %}
        <tr>
            <td>{{ forloop.counter }}</td>
            <td>{{ transaction.description }}</td>
            <td>₹ {{ transaction.amount }}</td>
            <td>{{ transaction.date }}</td>
            <td>
                <a class="edit-btn"
                   href="{% url 'edit_transaction' transaction.id %}">
                   Edit
                </a>

                <a class="delete-btn"
                   href="{% url 'delete_transaction' transaction.id %}"
                   onclick="return confirm('Delete this transaction?')">
                   Delete
                </a>
            </td>
        </tr>
        {% endfor %}
    </table>

</body>
</html>
